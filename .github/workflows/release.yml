name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    uses: dsanroman96/workflow-templates/.github/workflows/upstream-release.yml@main
    with:
      bump: ${{ inputs.bump }}
      project_type: typescript
      downstream_repos: ${{ vars.DOWNSTREAM_REPOS }}
    secrets: inherit
